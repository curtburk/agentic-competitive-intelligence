# ─────────────────────────────────────────────
# HP ZGX Competitive Landscape
# Organized by product tier: Fury vs Nano competitors
# ─────────────────────────────────────────────

competitors:
  # ── FURY COMPETITORS ──────────────────────────
  - name: Dell
    tier: fury
    query_templates:
      - "Dell AI workstation product launch 2026"
      - "Dell on-premises inference announcement"
      - "Dell ITAR FedRAMP AI compliance"
      - "Dell edge AI defense contract"
    products:
      - name: "Dell Pro Max GB300"
        tier: fury
        url: "https://www.dell.com/en-us/shop/desktop-computers/dell-pro-max-with-gb300/spd/dell-pro-max-fct6263-desktop"
        queries:
          - "Dell Pro Max GB300"
          - "Dell Pro Max GB300 specs pricing"
          - "Dell Pro Max GB300 review"
      - name: "Dell Pro Max GB10"
        tier: nano
        queries:
          - "Dell Pro Max GB10"
          - "Dell Pro Max GB10 specs pricing"

  - name: ASUS
    tier: both
    query_templates:
      - "ASUS AI workstation 2026"
