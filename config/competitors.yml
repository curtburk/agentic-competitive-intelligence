      - name: "HPE ProLiant DL380a"
        tier: fury
        queries:
          - "HPE ProLiant DL380a GPU AI"

# Cross-cutting queries that aren't competitor-specific.
# These catch new entrants and industry trends.
market_queries:
  - "on-premises AI workstation comparison 2026"
  - "air-gapped AI inference hardware"
  - "NVIDIA Blackwell workstation OEM"
  - "NVIDIA GB10 Grace Blackwell desktop"
  - "FedRAMP AI workstation approved"
  - "edge AI hardware defense contract award 2026"
  - "GB300 AI workstation"

# Pre-filter: results must contain at least one keyword from this list
# in their title or snippet to pass to the Collector agent.
relevance_keywords:
  - "ai"
  - "inference"
  - "workstation"
  - "gpu"
  - "edge"
  - "on-prem"
  - "on-premises"
  - "data sovereignty"
  - "air-gap"
  - "itar"
  - "fedramp"
  - "blackwell"
  - "grace"
  - "tops"
  - "vram"
  - "dgx"
  - "gb10"
  - "gb300"

# SearXNG search settings
search_settings:
  time_range: "week"
  categories: "general,news,it"
  max_results_per_query: 2

hp_positioning:
  core_narrative: >
    Compliance by Architecture: HP ZGX Nano and ZGX Fury deliver
    AI inference entirely on-premises, eliminating cloud dependencies.
    Data never leaves the device. This is not a policy, it is an
    architectural guarantee.

  products:
    zgx_nano:
      chip: "NVIDIA GB10 Grace Blackwell Superchip"
      arch: "ARM64/aarch64"
      memory: "128GB unified"
      tops: "~1000"
      compute_capability: "sm_121"
      competes_with:
        - "Dell Pro Max GB10"
        - "ASUS Ascent GX10"
        - "Lenovo ThinkStation PGX"
        - "NVIDIA DGX Spark"
        - "Gigabyte AI Top ATOM"
        - "MSI EdgeXpert"

    zgx_fury:
      chip: "NVIDIA Blackwell Ultra"
      memory: "748GB coherent"
      cooling: "Liquid-cooled"
      price_range: "~$100K"
      competes_with:
        - "Dell Pro Max GB300"
        - "ASUS ExpertCenter Pro ET900N G3"
        - "NVIDIA DGX Station"
        - "MSI XpertStation WS300"
        - "MSI CT60-S8060"
        - "Supermicro Super AI Station"
        - "Gigabyte W775-V10-L01"

  target_verticals:
    - federal/defense
    - healthcare
    - SLED
    - manufacturing

  differentiators:
    - "Compliance by Architecture (not policy)"
    - "Procurement accelerator for regulated industries"
    - "No cloud dependency for inference"
    - "Runs production models locally (Qwen3.6-35B-A3B, Mixtral-8x7B)"
    - "Containerized demo portfolio proves real workloads"
