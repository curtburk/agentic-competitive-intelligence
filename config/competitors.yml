        tier: nano
        queries:
          - "MSI EdgeXpert AI"
          - "MSI EdgeXpert specs pricing"

  - name: Supermicro
    tier: fury
    query_templates:
      - "Supermicro AI workstation 2026"
      - "Supermicro GPU server announcement"
