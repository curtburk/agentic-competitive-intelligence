        tier: nano
        queries:
          - "Gigabyte AI Top ATOM"
          - "Gigabyte AI Top ATOM specs pricing"

  - name: Lenovo
    tier: nano
    query_templates:
      - "Lenovo AI workstation product launch 2026"
      - "Lenovo edge AI hardware announcement"
    products:
      - name: "Lenovo ThinkStation PGX"
        tier: nano
        queries:
          - "Lenovo ThinkStation PGX"
          - "Lenovo ThinkStation PGX specs pricing"

  - name: HPE
    tier: fury
    query_templates:
      - "HPE AI workstation edge inference 2026"
