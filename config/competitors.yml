      - name: "Supermicro Super AI Station"
        tier: fury
        queries:
          - "Supermicro Super AI Station"
          - "Supermicro Super AI Station specs pricing"

  - name: Gigabyte
    tier: both
    query_templates:
      - "Gigabyte AI workstation 2026"
      - "Gigabyte enterprise AI hardware"
    products:
      - name: "Gigabyte W775-V10-L01"
        tier: fury
        queries:
          - "Gigabyte W775-V10-L01"
          - "Gigabyte W775 AI workstation"
