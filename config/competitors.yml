          - "NVIDIA DGX Spark"
          - "NVIDIA DGX Spark specs pricing availability"

  - name: MSI
    tier: both
    query_templates:
      - "MSI AI workstation 2026"
      - "MSI enterprise AI edge hardware"
    products:
