services:
  searxng:
    image: searxng/searxng:latest
    container_name: competitive-intel-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:cu130-nightly
    container_name: competitive-intel-vllm
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${HF_CACHE:-/home/curtburk/.cache/huggingface}:/root/.cache/huggingface
    ports:
      - "8091:8000"
    ipc: host
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: >
      --model Qwen/Qwen3.6-35B-A3B
      --speculative-config '{"method": "dflash", "model": "z-lab/Qwen3.6-35B-A3B-DFlash", "num_speculative_tokens": 15}'
      --attention-backend flash_attn
      --max-model-len 65536
      --max-num-batched-tokens 65536
      --gpu-memory-utilization 0.90
      --enable-prefix-caching
      --trust-remote-code
      --default-chat-template-kwargs '{"enable_thinking": false}'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    container_name: competitive-intel-orchestrator
    ports:
      - "8000:8000"
    environment:
      - SEARXNG_URL=http://searxng:8080
      - VLLM_URL=http://vllm:8000
      - VLLM_MODEL=Qwen/Qwen3.6-35B-A3B
      - WIKI_ROOT=/data/wiki
      - TRACE_DB_PATH=/data/traces.db
    volumes:
      - ./data:/data
      - ./config:/config
    depends_on:
      searxng:
        condition: service_started
      vllm:
        condition: service_healthy
    restart: unless-stopped